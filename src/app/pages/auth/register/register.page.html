<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Daftar Akun Vendor</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form (ngSubmit)="onRegister()" #registerForm="ngForm">

    <ion-list lines="none" class="auth-form-list">

      <ion-item class="auth-item">
        <ion-label position="stacked">Nama Lengkap *</ion-label>
        <ion-input name="name" [(ngModel)]="form.name" required placeholder="Nama lengkap"></ion-input>
      </ion-item>

      <ion-item class="auth-item">
        <ion-label position="stacked">Email *</ion-label>
        <ion-input type="email" name="email" [(ngModel)]="form.email" required placeholder="email@perusahaan.com"></ion-input>
      </ion-item>

      <ion-item class="auth-item">
        <ion-label position="stacked">Nama Perusahaan *</ion-label>
        <ion-input name="company_name" [(ngModel)]="form.company_name" required placeholder="PT. Contoh Jaya"></ion-input>
      </ion-item>

      <ion-item class="auth-item">
        <ion-label position="stacked">Nomor Telepon *</ion-label>
        <ion-input type="tel" name="phone" [(ngModel)]="form.phone" required placeholder="08xxxxxxxxxx"></ion-input>
      </ion-item>

      <ion-item class="auth-item">
        <ion-label position="stacked">Alamat *</ion-label>
        <ion-textarea name="address" [(ngModel)]="form.address" required placeholder="Alamat lengkap perusahaan" rows="3"></ion-textarea>
      </ion-item>

      <ion-item class="auth-item">
        <ion-label position="stacked">Password *</ion-label>
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="form.password"
          required
          placeholder="Min. 8 karakter">
        </ion-input>
        <ion-button slot="end" fill="clear" (click)="togglePassword()">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-item class="auth-item">
        <ion-label position="stacked">Konfirmasi Password *</ion-label>
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          name="password_confirmation"
          [(ngModel)]="form.password_confirmation"
          required
          placeholder="Ulangi password">
        </ion-input>
      </ion-item>

    </ion-list>

    <div class="auth-error" *ngIf="errorMessage">
      <ion-icon name="alert-circle-outline"></ion-icon>
      {{ errorMessage }}
    </div>

    <ion-button
      expand="block"
      type="submit"
      class="auth-btn"
      [disabled]="isLoading || !registerForm.valid">
      <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
      <span *ngIf="!isLoading">Daftar Sekarang</span>
    </ion-button>

    <div class="auth-footer">
      <span>Sudah punya akun?</span>
      <ion-button fill="clear" routerLink="/login">Masuk</ion-button>
    </div>

  </form>

</ion-content>
