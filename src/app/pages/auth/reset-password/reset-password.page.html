<ion-content [fullscreen]="true">
  <div class="page-wrapper">
    
    <!-- Top Vector Area -->
    <div class="top-vector-container">
      <svg width="360" height="102" viewBox="0 0 360 102" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M316 -32.5001C332.5 -30.012 383.314 -20.691 382.5 24C384.873 37.3009 355.799 64.2256 312.263 64.2256H57.9614C33.5485 64.0482 -13.5481 71.3548 -6.63115 102L-58 -15.5798C46.4331 -37.0386 253 -42 316 -32.5001Z" fill="white"/>
      </svg>
      <!-- Header inside top vector -->
      <div class="custom-header">
        <div class="header-left-group">
          <ion-button fill="clear" class="btn-header-back" (click)="goLogin()">
            <ion-icon name="arrow-back" slot="icon-only"></ion-icon>
          </ion-button>
          <span class="header-title">Reset Password</span>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="auth-container">
      <div class="auth-header">
        <!-- Logo -->
        <img src="assets/logo.png" class="auth-logo" alt="E-Tender Logo" />
        <h2 class="title">Reset Password</h2>
      </div>

      <!-- Form Area -->
      <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
        
        <!-- Error box -->
        <div class="auth-error" *ngIf="error">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ error }}</span>
        </div>

        <div class="field-wrapper" [class.has-error]="validationErrors['email']">
          <ion-icon name="mail"></ion-icon>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="email@perusahaan.com"
            inputmode="email"
            autocomplete="email">
          </ion-input>
        </div>
        <p class="field-error-text" *ngIf="validationErrors['email']">{{ validationErrors['email'] }}</p>

        <div class="field-wrapper" [class.has-error]="validationErrors['token']">
          <ion-icon name="key"></ion-icon>
          <ion-input
            type="text"
            name="token"
            [(ngModel)]="token"
            required
            placeholder="Masukan Token"
            autocomplete="off">
          </ion-input>
        </div>
        <p class="field-error-text" *ngIf="validationErrors['token']">{{ validationErrors['token'] }}</p>

        <div class="field-wrapper" [class.has-error]="validationErrors['password']">
          <ion-icon name="lock-closed"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="Password baru Min. 8 karakter"
            autocomplete="new-password">
          </ion-input>
          <ion-icon 
            [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" 
            (click)="showPassword = !showPassword"
            style="cursor: pointer; color: #9CA3AF; font-size: 20px;">
          </ion-icon>
        </div>
        <p class="field-error-text" *ngIf="validationErrors['password']">{{ validationErrors['password'] }}</p>

        <div class="field-wrapper" [class.has-error]="validationErrors['password_confirmation']">
          <ion-icon name="lock-closed"></ion-icon>
          <ion-input
            [type]="showPasswordConf ? 'text' : 'password'"
            name="password_confirmation"
            [(ngModel)]="passwordConfirmation"
            required
            placeholder="Konfirmasi Password Baru"
            autocomplete="new-password">
          </ion-input>
          <ion-icon 
            [name]="showPasswordConf ? 'eye-outline' : 'eye-off-outline'" 
            (click)="showPasswordConf = !showPasswordConf"
            style="cursor: pointer; color: #9CA3AF; font-size: 20px;">
          </ion-icon>
        </div>
        <p class="field-error-text" *ngIf="validationErrors['password_confirmation']">{{ validationErrors['password_confirmation'] }}</p>

        <ion-button
          expand="block"
          type="submit"
          class="btn-cta"
          [disabled]="isLoading || isFormInvalid">
          <span *ngIf="!isLoading">Reset Password</span>
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </ion-button>

        <!-- Footer -->
        <div class="auth-footer">
          <ion-button fill="clear" size="small" (click)="goForgotPassword()" class="footer-link">
            Kirim Ulang Token
          </ion-button>
          <span class="divider">|</span>
          <ion-button fill="clear" size="small" (click)="goLogin()" class="footer-link bold">
            Login
          </ion-button>
        </div>

      </form>
    </div>

    <!-- Bottom Vector -->
    <div class="bottom-vector-container">
      <svg width="360" height="108" viewBox="0 0 360 108" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M322.346 36.3582C349.913 35.1116 359.508 11.6 360.859 0L409 174L-3.49336 161.015V70.1194C-16.0607 39.3707 21.6752 34.8 42.114 36.3582C124.038 36.8776 294.779 37.6048 322.346 36.3582Z" fill="white"/>
      </svg>
    </div>

  </div>
</ion-content>
