  <div class="page-wrapper">

        <h2 class="title">Login</h2>
    </div> 


    <div class="auth-container">
      <!-- Logo / Header -->
      <div class="auth-header">
        <img src="assets/logo.png" class="auth-logo" alt="E-Tender Logo" />
        <h1>E-Tender</h1>
      </div>

      <!-- Login Form -->
      <form (ngSubmit)="onLogin()" #loginForm="ngForm">
        
        <div class="field-wrapper">
          <ion-icon name="mail"></ion-icon>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="Masukan Email Anda"
            autocomplete="email">
          </ion-input>
        </div>

        <div class="field-wrapper">
          <ion-icon name="lock-closed"></ion-icon>
          <ion-input
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="••••••••">
          </ion-input>
        </div>

        <div class="auth-error" *ngIf="errorMessage">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ errorMessage }}
        </div>

        <div class="forgot-password">
          <ion-button fill="clear" routerLink="/forgot">Forget Password</ion-button>
        </div>

        <div class="divider"></div>

        <ion-button
          expand="block"
          type="submit"
          class="btn-cta"
          [disabled]="isLoading || !loginForm.valid">
          <span *ngIf="!isLoading">Login</span>
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </ion-button>

        <ion-button
          expand="block"
          class="btn-register"
          routerLink="/register">
          Register
        </ion-button>

      </form>
    </div>

    <!-- BOTTOM WAVE — ganti SVG yang lama -->
    <div class="bottom-vector-container">

<svg width="360" height="108" viewBox="0 0 360 108" fill="none" xmlns="http://www.w3.org/2000/svg">

    </div>

  </div>
</ion-content>
