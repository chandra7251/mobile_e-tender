<ion-content [fullscreen]="true">
  <div class="page-wrapper">
    <div class="top-vector-container">
      <svg width="360" height="102" viewBox="0 0 360 102" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M316 -32.5001C332.5 -30.012 383.314 -20.691 382.5 24C384.873 37.3009 355.799 64.2256 312.263 64.2256H57.9614C33.5485 64.0482 -13.5481 71.3548 -6.63115 102L-58 -15.5798C46.4331 -37.0386 253 -42 316 -32.5001Z" fill="#26366C"/>
      </svg>
      <div class="custom-header">
        <span class="header-title">Login</span>
      </div>
    </div>
    <div class="auth-container">
      <div class="auth-header">
        <img src="assets/logo.png" class="auth-logo" alt="E-Tender Logo" />
        <h1 class="nama-apk">ZETA</h1>
        <h5 class="desk-apk">Zona E-Procurement Tender Akses</h5>
      </div>
      <form (ngSubmit)="onLogin()" #loginForm="ngForm">
        <div class="field-wrapper">
          <ion-icon name="mail"></ion-icon>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="Masukan Email Anda"
            autocomplete="email">
          </ion-input>
        </div>
        <div class="field-wrapper">
          <ion-icon name="lock-closed"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="••••••••">
          </ion-input>
          <ion-icon 
            [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" 
            (click)="showPassword = !showPassword"
            style="cursor: pointer; color: #9CA3AF; font-size: 20px;">
          </ion-icon>
        </div>
        <div class="auth-error" *ngIf="errorMessage">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ errorMessage }}
        </div>
        <div *ngIf="isUnverified" style="text-align: center; margin-top: 10px;">
          <ion-button fill="outline" color="primary" size="small" (click)="resendEmail()" [disabled]="isResending">
            <ion-spinner *ngIf="isResending" name="crescent" style="margin-right: 5px;"></ion-spinner>
            <span *ngIf="!isResending">Kirim Ulang Email Verifikasi</span>
          </ion-button>
        </div>
        <div class="forgot-password">
          <ion-button fill="clear" routerLink="/forgot-password">Forget Password</ion-button>
        </div>
        <div class="divider"></div>
        <ion-button
          expand="block"
          type="submit"
          class="btn-cta"
          [disabled]="isLoading || !loginForm.valid">
          <span *ngIf="!isLoading">Login</span>
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </ion-button>
        <ion-button
          expand="block"
          class="btn-register"
          routerLink="/register">
          Register
        </ion-button>
      </form>
    </div>
    <div class="bottom-vector-container">
     <svg width="360" height="108" viewBox="0 0 360 108" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M322.346 36.3582C349.913 35.1116 359.508 11.6 360.859 0L409 174L-3.49336 161.015V70.1194C-16.0607 39.3707 21.6752 34.8 42.114 36.3582C124.038 36.8776 294.779 37.6048 322.346 36.3582Z" fill="#26366C"/>
     </svg>
    </div>
  </div>
</ion-content>
