<ion-content [fullscreen]="true">
  <div class="page-wrapper">
    <div class="top-vector-container">
      <svg width="360" height="102" viewBox="0 0 360 102" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M316 -32.5001C332.5 -30.012 383.314 -20.691 382.5 24C384.873 37.3009 355.799 64.2256 312.263 64.2256H57.9614C33.5485 64.0482 -13.5481 71.3548 -6.63115 102L-58 -15.5798C46.4331 -37.0386 253 -42 316 -32.5001Z" fill="#26366C"/>
      </svg>
      <div class="custom-header">
        <ion-button fill="clear" class="btn-header-back" (click)="goLogin()">
          <ion-icon name="arrow-back" slot="icon-only"></ion-icon>
        </ion-button>
        <span class="header-title">Forgot Password</span>
      </div>
    </div>
    <div class="auth-container">
      <div class="auth-header">
        <img src="assets/logo.png" class="auth-logo" alt="E-Tender Logo" />
        <h2 class="title">Forgot Password</h2>
        <p class="subtitle" *ngIf="!successMessage">Masukan email yang terdaftar. Kami akan memberikan instruksi reset password.</p>
      </div>
      <ion-card class="success-card" *ngIf="successMessage">
        <ion-card-content>
          <div class="success-body">
            <ion-icon name="checkmark-circle-outline" class="success-icon"></ion-icon>
            <div>
              <p class="success-text">{{ successMessage }}</p>
              <p class="success-hint">Setelah mendapat token, lanjutkan ke halaman Reset Password.</p>
            </div>
          </div>
          <ion-button expand="block" class="btn-secondary" (click)="goResetPassword()">
            Masukkan Token Reset
          </ion-button>
        </ion-card-content>
      </ion-card>
      <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" *ngIf="!successMessage">
        <div class="field-wrapper">
          <ion-icon name="mail"></ion-icon>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="Kirim Email Perusahaan"
            inputmode="email"
            autocomplete="email">
          </ion-input>
        </div>
        <div class="auth-error" *ngIf="error">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ error }}
        </div>
        <ion-button
          expand="block"
          type="submit"
          class="btn-cta"
          [disabled]="isLoading || !email">
          <span *ngIf="!isLoading">Kirim Link Reset</span>
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </ion-button>
      </form>
    </div>
    <div class="bottom-vector-container">
      <svg width="360" height="108" viewBox="0 0 360 108" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M322.346 36.3582C349.913 35.1116 359.508 11.6 360.859 0L409 174L-3.49336 161.015V70.1194C-16.0607 39.3707 21.6752 34.8 42.114 36.3582C124.038 36.8776 294.779 37.6048 322.346 36.3582Z" fill="#26366C"/>
</svg>
    </div>
  </div>
</ion-content>
