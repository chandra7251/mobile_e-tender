<ion-content class="auth-content">

  <div class="auth-wrapper">

    <!-- Icon + heading -->
    <div class="auth-header">
      <div class="icon-circle">
        <ion-icon name="lock-open-outline"></ion-icon>
      </div>
      <h1 class="auth-title">Lupa Password?</h1>
      <p class="auth-subtitle">
        Masukkan email yang terdaftar. Kami akan mengirimkan instruksi reset password.
      </p>
    </div>

    <!-- Success state -->
    <ion-card class="success-card" *ngIf="successMessage">
      <ion-card-content>
        <div class="success-body">
          <ion-icon name="checkmark-circle-outline" color="success"></ion-icon>
          <div>
            <p class="success-text">{{ successMessage }}</p>
            <p class="success-hint">Setelah mendapat token, lanjutkan ke halaman Reset Password.</p>
          </div>
        </div>
        <ion-button expand="block" fill="outline" (click)="goResetPassword()" id="btn-go-reset" class="mt-12">
          <ion-icon slot="start" name="key-outline"></ion-icon>
          Masukkan Token Reset
        </ion-button>
      </ion-card-content>
    </ion-card>

    <!-- Form -->
    <div class="form-section" *ngIf="!successMessage">

      <!-- Error box -->
      <div class="error-box" *ngIf="error">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>{{ error }}</span>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="inp-email">Email</label>
        <div class="input-wrap" [class.focused]="emailFocused">
          <ion-icon name="mail-outline" class="inp-icon"></ion-icon>
          <input
            type="email"
            id="inp-email"
            class="auth-input"
            placeholder="email@perusahaan.com"
            [(ngModel)]="email"
            (focus)="emailFocused=true"
            (blur)="emailFocused=false"
            inputmode="email"
            autocomplete="email"
          />
        </div>
      </div>

      <!-- Submit -->
      <ion-button
        expand="block"
        (click)="onSubmit()"
        [disabled]="isLoading || !email.trim()"
        id="btn-forgot-submit"
        class="auth-btn">
        <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
        <ion-icon *ngIf="!isLoading" name="send-outline" slot="start"></ion-icon>
        {{ isLoading ? 'Mengirim...' : 'Kirim Link Reset' }}
      </ion-button>

    </div>

    <!-- Back to login -->
    <div class="auth-footer">
      <span>Ingat password?</span>
      <ion-button fill="clear" size="small" (click)="goLogin()" id="btn-back-login">
        Kembali ke Login
      </ion-button>
    </div>

  </div>

</ion-content>
