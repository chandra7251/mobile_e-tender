<ion-header>
  <ion-toolbar color="primary">
    <ion-title>E-Catalogue</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/tabs/catalogue/my">
        <ion-icon name="storefront-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar placeholder="Cari produk/jasa..." (ionInput)="onSearch($event)" debounce="400"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Category Filter -->
  <div style="padding:12px;display:flex;gap:8px;overflow-x:auto;">
    <ion-chip [color]="!selectedCategory ? 'primary' : 'medium'" (click)="selectedCategory=undefined;onCategoryChange()">
      <ion-label>Semua</ion-label>
    </ion-chip>
    <ion-chip *ngFor="let cat of categories"
      [color]="selectedCategory === cat.id ? 'primary' : 'medium'"
      (click)="selectedCategory=cat.id;onCategoryChange()">
      <ion-label>{{cat.name}}</ion-label>
    </ion-chip>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" style="padding:40px;text-align:center;">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <!-- Error -->
  <div *ngIf="loadError && !isLoading" style="padding:24px;text-align:center;">
    <ion-icon name="alert-circle-outline" color="danger" style="font-size:40px;"></ion-icon>
    <p style="color:#666;margin-top:8px;">{{loadError}}</p>
  </div>

  <!-- Total -->
  <div *ngIf="!isLoading && !loadError" style="padding:8px 16px;">
    <p style="font-size:12px;color:#888;">{{total}} produk/jasa ditemukan</p>
  </div>

  <!-- Grid -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px 12px;" *ngIf="!isLoading && items.length > 0">
    <div *ngFor="let item of items"
      [routerLink]="['/tabs/catalogue', item.id]"
      style="background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.08);overflow:hidden;cursor:pointer;">
      <div style="height:120px;background:#f5f5f5;overflow:hidden;display:flex;align-items:center;justify-content:center;">
        <img *ngIf="getPhotoUrl(item)" [src]="getPhotoUrl(item)" style="width:100%;height:100%;object-fit:cover;">
        <ion-icon *ngIf="!getPhotoUrl(item)" name="image-outline" style="font-size:36px;color:#ccc;"></ion-icon>
      </div>
      <div style="padding:10px;">
        <p style="font-size:12px;font-weight:700;color:#222;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{item.name}}</p>
        <p style="font-size:10px;color:#888;margin:2px 0 0;">{{item.vendor?.company_name || ''}}</p>
        <p *ngIf="item.price_estimate" style="font-size:11px;font-weight:700;color:#3553A8;margin:6px 0 0;">
          {{formatPrice(item.price_estimate)}}/{{item.unit}}
        </p>
        <p *ngIf="item.category" style="font-size:10px;color:#28C5D4;margin:4px 0 0;">{{item.category?.name}}</p>
      </div>
    </div>
  </div>

  <!-- Empty -->
  <div *ngIf="!isLoading && !loadError && items.length === 0" style="padding:60px 24px;text-align:center;">
    <ion-icon name="storefront-outline" style="font-size:60px;color:#ddd;"></ion-icon>
    <p style="color:#999;margin-top:16px;">Belum ada item di katalog</p>
  </div>
</ion-content>
