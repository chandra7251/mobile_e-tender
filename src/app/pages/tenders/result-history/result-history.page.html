<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Riwayat Hasil Tender</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content
      pullingText="Tarik untuk refresh"
      refreshingText="Memuat ulang...">
    </ion-refresher-content>
  </ion-refresher>

  <div class="page-content ion-padding">

    <!-- ════ SKELETON ════ -->
    <ng-container *ngIf="isLoading">
      <ion-card class="history-card" *ngFor="let i of skeletonItems">
        <ion-card-content>
          <ion-skeleton-text animated style="width:30%; height:20px; border-radius:12px; margin-bottom:10px;"></ion-skeleton-text>
          <ion-skeleton-text animated style="width:80%; height:16px; margin-bottom:6px;"></ion-skeleton-text>
          <ion-skeleton-text animated style="width:50%; height:13px;"></ion-skeleton-text>
        </ion-card-content>
      </ion-card>
    </ng-container>

    <!-- ════ ERROR ════ -->
    <div class="error-box" *ngIf="errorMessage && !isLoading">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span>{{ errorMessage }}</span>
      <ion-button fill="clear" size="small" (click)="loadResults()">Coba Lagi</ion-button>
    </div>

    <!-- ════ EMPTY ════ -->
    <div class="empty-state" *ngIf="!isLoading && !errorMessage && allTenders.length === 0">
      <ion-icon name="trophy-outline"></ion-icon>
      <h3>Belum Ada Hasil</h3>
      <p>Tender yang sudah selesai atau ditutup akan muncul di sini.</p>
    </div>

    <!-- ════ LIST ════ -->
    <ng-container *ngIf="!isLoading && allTenders.length > 0">

      <p class="list-info">{{ allTenders.length }} tender ditemukan</p>

      <ion-card
        class="history-card"
        *ngFor="let tender of allTenders"
        (click)="goToResult(tender)"
        button
        id="btn-tender-result-{{ tender.id }}">
        <ion-card-content>

          <div class="status-row">
            <ion-badge [color]="getStatusColor(tender.status)" class="status-badge">
              {{ getStatusLabel(tender.status) }}
            </ion-badge>
          </div>

          <h2 class="tender-title">{{ tender.title }}</h2>

          <div class="date-row">
            <ion-icon name="calendar-outline"></ion-icon>
            <span>Berakhir: {{ formatDate(tender.end_date) }}</span>
          </div>

          <div class="cta-row">
            <span class="cta-text">Lihat Hasil</span>
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </div>

        </ion-card-content>
      </ion-card>

    </ng-container>

  </div>

</ion-content>
